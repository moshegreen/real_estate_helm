name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t real-estate-helm-api:${{ inputs.version }} .

  windows-desktop:
    runs-on: windows-latest
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop dependencies
        working-directory: apps/windows
        run: npm install
      - name: Build signed Tauri bundle
        working-directory: apps/windows
        run: npm run bundle
      - uses: actions/upload-artifact@v4
        with:
          name: real-estate-helm-windows-${{ inputs.version }}
          path: apps/windows/src-tauri/target/release/bundle/**

  android-mobile:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install mobile dependencies
        working-directory: apps/android
        run: npm install
      - name: Decode Android signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: apps/android/android/app
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
      - name: Build Android release package
        working-directory: apps/android
        run: npm run build:android
      - uses: actions/upload-artifact@v4
        with:
          name: real-estate-helm-android-${{ inputs.version }}
          path: apps/android/android/app/build/outputs/**
